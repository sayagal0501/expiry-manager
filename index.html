const DEFAULT_CATEGORIES = ['食品', '化粧品', '薬', 'その他'];

// ─── ユーティリティ ───────────────────────────────────
function daysUntil(dateStr) {
  const today = new Date(); today.setHours(0,0,0,0);
  const t = new Date(dateStr); t.setHours(0,0,0,0);
  return Math.ceil((t - today) / 86400000);
}
function urgencyColor(days) {
  if (days < 0)   return { bg:'bg-gray-100',   border:'border-gray-400',   badge:'bg-gray-800 text-white',         dot:'bg-gray-700',   bar:'bg-gray-600',   label:'期限切れ' };
  if (days <= 7)  return { bg:'bg-red-50',     border:'border-red-300',    badge:'bg-red-100 text-red-700',        dot:'bg-red-400',    bar:'bg-red-400',    label:'期限間近' };
  if (days <= 30) return { bg:'bg-yellow-50',  border:'border-yellow-300', badge:'bg-yellow-100 text-yellow-700',  dot:'bg-yellow-400', bar:'bg-yellow-400', label:'もうすぐ' };
  return           { bg:'bg-blue-50',    border:'border-blue-200',   badge:'bg-blue-100 text-blue-700',      dot:'bg-blue-400',   bar:'bg-blue-400',   label:'余裕あり' };
}
function formatDate(dateStr) {
  const d = new Date(dateStr);
  return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`;
}
function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }

// 写真をFirestore用に圧縮（最大幅400px, JPEG60%）
function compressImage(dataUrl) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      const maxW = 400;
      const ratio = Math.min(1, maxW / img.width);
      const canvas = document.createElement('canvas');
      canvas.width  = img.width  * ratio;
      canvas.height = img.height * ratio;
      canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
      resolve(canvas.toDataURL('image/jpeg', 0.6));
    };
    img.src = dataUrl;
  });
}

// OCR日付抽出
function extractDateFromText(text) {
  const patterns = [
    /(\d{4})[\/\-\.](\d{1,2})[\/\-\.](\d{1,2})/,
    /(\d{4})年\s*(\d{1,2})月\s*(\d{1,2})日/,
    /(\d{2})[\/\.](\d{1,2})[\/\.](\d{1,2})/,
    /(\d{1,2})\/(\d{1,2})\/(\d{4})/,
  ];
  for (const pat of patterns) {
    const m = text.match(pat);
    if (m) {
      let [, y, mo, d] = m;
      if (parseInt(y) < 100) y = '20' + y;
      y = parseInt(y); mo = parseInt(mo); d = parseInt(d);
      if (mo >= 1 && mo <= 12 && d >= 1 && d <= 31)
        return `${y}-${String(mo).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    }
  }
  return null;
}

// ─── アイテムカード ───────────────────────────────────
function ItemCard({ item, onEdit, onDelete }) {
  const days = daysUntil(item.expiryDate);
  const color = urgencyColor(days);
  const [offsetX, setOffsetX] = useState(0);
  const [dragging, setDragging] = useState(false);
  const startX = useRef(0);
  const THRESHOLD = 72;

  const onTouchStart = (e) => { startX.current = e.touches[0].clientX; setDragging(true); };
  const onTouchMove  = (e) => { setOffsetX(Math.max(-120, Math.min(120, e.touches[0].clientX - startX.current))); };
  const onTouchEnd   = () => {
    setDragging(false);
    if (offsetX > THRESHOLD) onEdit(item);
    else if (offsetX < -THRESHOLD) onDelete(item.id);
    setOffsetX(0);
  };

  const revealOpacity = Math.min(1, Math.abs(offsetX) / THRESHOLD);
  const isRight = offsetX > 0;
  const isLeft  = offsetX < 0;

  return (
    <div className="relative rounded-2xl overflow-hidden card-shadow">
      <div className={`absolute inset-0 flex items-center px-5 ${isLeft ? 'justify-end bg-red-400' : 'justify-start bg-amber-400'}`}
        style={{ opacity: revealOpacity }}>
        {isLeft  && <div className="flex flex-col items-center gap-0.5 text-white"><Icons.Trash /><span className="text-xs font-medium">削除</span></div>}
        {isRight && <div className="flex flex-col items-center gap-0.5 text-white"><Icons.Edit /><span className="text-xs font-medium">編集</span></div>}
      </div>
      <div
        className={`relative border rounded-2xl ${color.bg} ${color.border} px-3 py-2.5 ${dragging ? '' : 'transition-transform duration-200'}`}
        style={{ transform: `translateX(${offsetX}px)` }}
        onTouchStart={onTouchStart} onTouchMove={onTouchMove} onTouchEnd={onTouchEnd}
      >
        <div className="flex items-center gap-3">
          {item.photos?.[0]
            ? <img src={item.photos[0]} alt="" className="w-10 h-10 rounded-xl object-cover flex-shrink-0" />
            : <div className="w-10 h-10 rounded-xl bg-white/70 flex items-center justify-center flex-shrink-0 text-lg">
                {item.category==='食品'?'🍱':item.category==='化粧品'?'💄':item.category==='薬'?'💊':'📦'}
              </div>
          }
          <div className="flex-1 min-w-0">
            <div className="flex items-center justify-between gap-2">
              <div className="flex items-center gap-1.5 min-w-0">
                <h3 className="font-semibold text-gray-800 text-sm leading-tight truncate">{item.name}</h3>
                <span className="text-xs text-gray-400 bg-white/60 px-1.5 py-0.5 rounded-full flex-shrink-0">{item.category}</span>
              </div>
              <div className="flex items-center gap-1.5 flex-shrink-0">
                <span className={`text-xs px-2 py-0.5 rounded-full font-medium ${color.badge}`}>{color.label}</span>
                <span className="text-xs text-gray-500 font-medium">{days < 0 ? `${Math.abs(days)}日超過` : `残り${days}日`}</span>
              </div>
            </div>
            <div className="flex items-center gap-1.5 mt-0.5 min-w-0">
              <p className="text-xs text-gray-500">{formatDate(item.expiryDate)}</p>
              {item.location && <><span className="text-xs text-gray-300">·</span><p className="text-xs text-gray-400 truncate">📍 {item.location}</p></>}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── 登録・編集画面 ───────────────────────────────────
function FormScreen({ item, categories, onSave, onCancel, saving }) {
  const isEdit = !!item;
  const [name, setName]             = useState(item?.name ?? '');
  const [expiryDate, setExpiryDate] = useState(item?.expiryDate ?? '');
  const [location, setLocation]     = useState(item?.location ?? '');
  const [category, setCategory]     = useState(item?.category ?? categories[0]);
  const [customCategory, setCustomCategory] = useState('');
  const [photos, setPhotos]         = useState(item?.photos ?? []);
  const [useCustomCat, setUseCustomCat] = useState(false);
  const [ocrState, setOcrState]     = useState('idle');
  const [ocrMsg, setOcrMsg]         = useState('');
  const fileRef = useRef();
  const ocrFileRef = useRef();

  const handlePhoto = (e) => {
    Array.from(e.target.files).forEach(file => {
      const reader = new FileReader();
      reader.onload = async ev => {
        const compressed = await compressImage(ev.target.result);
        setPhotos(prev => [...prev, compressed]);
      };
      reader.readAsDataURL(file);
    });
  };

  const handleOcrFile = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    setOcrState('scanning'); setOcrMsg('画像を読み取り中…');
    const reader = new FileReader();
    reader.onload = async (ev) => {
      const compressed = await compressImage(ev.target.result);
      setPhotos(prev => [...prev, compressed]);
      try {
        setOcrMsg('文字を認識中（初回は少し時間がかかります）…');
        const result = await Tesseract.recognize(ev.target.result, 'jpn+eng', {
          logger: m => { if (m.status === 'recognizing text') setOcrMsg(`文字認識中… ${Math.round(m.progress*100)}%`); }
        });
        const detected = extractDateFromText(result.data.text);
        if (detected) { setExpiryDate(detected); setOcrState('done'); setOcrMsg(`日付を検出しました：${formatDate(detected)}`); }
        else           { setOcrState('error'); setOcrMsg('日付を自動検出できませんでした。手動で入力してください。'); }
      } catch { setOcrState('error'); setOcrMsg('OCR処理に失敗しました。'); }
    };
    reader.readAsDataURL(file);
  };

  const handleSubmit = (e) => {
    e?.preventDefault();
    if (!name.trim() || !expiryDate) return;
    const finalCat = useCustomCat ? (customCategory.trim() || categories[0]) : category;
    onSave({ id: item?.id ?? genId(), name: name.trim(), expiryDate, location: location.trim(), category: finalCat, photos });
  };

  return (
    <div className="flex flex-col h-full">
      <div className="flex items-center justify-between px-4 py-4 bg-cream-50 border-b border-cream-200">
        <button onClick={onCancel} className="p-2 rounded-xl hover:bg-cream-100 transition-colors"><Icons.X /></button>
        <h2 className="font-semibold text-gray-800 text-lg">{isEdit ? '編集' : '新規登録'}</h2>
        <button onClick={handleSubmit} disabled={saving}
          className="bg-amber-500 hover:bg-amber-600 disabled:opacity-50 text-white px-4 py-1.5 rounded-xl text-sm font-medium transition-colors flex items-center gap-1">
          <Icons.Check /> {saving ? '保存中…' : '保存'}
        </button>
      </div>
      <form onSubmit={handleSubmit} className="flex-1 overflow-y-auto px-4 py-5 space-y-5">
        <div className="bg-gradient-to-r from-amber-50 to-orange-50 border border-amber-200 rounded-2xl p-4">
          <div className="flex items-start gap-3">
            <div className="bg-amber-100 rounded-xl p-2 flex-shrink-0"><Icons.Scan /></div>
            <div className="flex-1 min-w-0">
              <p className="text-sm font-medium text-gray-700">📷 期限をカメラで読み取る</p>
              <p className="text-xs text-gray-400 mt-0.5">商品の期限部分を撮影して自動入力</p>
              {ocrState !== 'idle' && (
                <div className={`mt-2 text-xs px-3 py-2 rounded-xl ${ocrState==='scanning'?'bg-blue-50 text-blue-600':ocrState==='done'?'bg-green-50 text-green-600':'bg-red-50 text-red-500'}`}>
                  {ocrState==='scanning'&&<span className="animate-pulse">⏳ </span>}{ocrState==='done'&&'✅ '}{ocrState==='error'&&'⚠️ '}{ocrMsg}
                </div>
              )}
              <button type="button" onClick={() => { ocrFileRef.current.click(); setOcrState('idle'); }} disabled={ocrState==='scanning'}
                className="mt-2 bg-amber-500 hover:bg-amber-600 disabled:opacity-50 text-white text-xs px-4 py-1.5 rounded-xl font-medium transition-colors">
                {ocrState==='scanning' ? '読み取り中…' : '画像を選択'}
              </button>
            </div>
          </div>
          <input ref={ocrFileRef} type="file" accept="image/*" capture="environment" className="hidden" onChange={handleOcrFile} />
        </div>

        <div>
          <label className="block text-sm font-medium text-gray-600 mb-1.5">商品名 <span className="text-red-400">*</span></label>
          <input type="text" value={name} onChange={e=>setName(e.target.value)} placeholder="例：牛乳、日焼け止めクリーム"
            className="w-full bg-white border border-cream-200 rounded-xl px-4 py-3 text-gray-800 placeholder-gray-300 focus:outline-none focus:ring-2 focus:ring-amber-300" />
        </div>
        <div>
          <label className="block text-sm font-medium text-gray-600 mb-1.5">賞味期限・使用期限 <span className="text-red-400">*</span></label>
          <input type="date" value={expiryDate} onChange={e=>setExpiryDate(e.target.value)}
            className="w-full bg-white border border-cream-200 rounded-xl px-4 py-3 text-gray-800 focus:outline-none focus:ring-2 focus:ring-amber-300" />
        </div>
        <div>
          <label className="block text-sm font-medium text-gray-600 mb-1.5">保管場所</label>
          <input type="text" value={location} onChange={e=>setLocation(e.target.value)} placeholder="例：冷蔵庫、洗面台、薬棚"
            className="w-full bg-white border border-cream-200 rounded-xl px-4 py-3 text-gray-800 placeholder-gray-300 focus:outline-none focus:ring-2 focus:ring-amber-300" />
        </div>
        <div>
          <label className="block text-sm font-medium text-gray-600 mb-1.5">カテゴリ</label>
          {!useCustomCat ? (
            <div className="flex flex-wrap gap-2">
              {categories.map(cat => (
                <button key={cat} type="button" onClick={() => setCategory(cat)}
                  className={`px-4 py-2 rounded-xl text-sm font-medium transition-colors ${category===cat?'bg-amber-500 text-white':'bg-white border border-cream-200 text-gray-600 hover:bg-cream-100'}`}>
                  {cat}
                </button>
              ))}
              <button type="button" onClick={() => setUseCustomCat(true)}
                className="px-4 py-2 rounded-xl text-sm text-amber-600 border border-amber-200 hover:bg-amber-50 transition-colors">+ 自由入力</button>
            </div>
          ) : (
            <div className="flex gap-2">
              <input type="text" value={customCategory} onChange={e=>setCustomCategory(e.target.value)} placeholder="カテゴリ名を入力" autoFocus
                className="flex-1 bg-white border border-cream-200 rounded-xl px-4 py-3 text-gray-800 placeholder-gray-300 focus:outline-none focus:ring-2 focus:ring-amber-300" />
              <button type="button" onClick={() => setUseCustomCat(false)} className="p-3 rounded-xl bg-white border border-cream-200 text-gray-500"><Icons.X /></button>
            </div>
          )}
        </div>
        <div>
          <label className="block text-sm font-medium text-gray-600 mb-1.5">写真（任意）</label>
          <div className="flex flex-wrap gap-2">
            {photos.map((src, i) => (
              <div key={i} className="relative">
                <img src={src} alt="" className="w-20 h-20 rounded-xl object-cover" />
                <button type="button" onClick={() => setPhotos(photos.filter((_,j)=>j!==i))}
                  className="absolute -top-1.5 -right-1.5 bg-red-400 text-white rounded-full w-5 h-5 flex items-center justify-center text-xs">✕</button>
              </div>
            ))}
            <button type="button" onClick={() => fileRef.current.click()}
              className="w-20 h-20 rounded-xl border-2 border-dashed border-cream-200 flex flex-col items-center justify-center text-gray-400 hover:bg-cream-100 transition-colors">
              <Icons.Camera /><span className="text-xs mt-1">追加</span>
            </button>
          </div>
          <input ref={fileRef} type="file" accept="image/*" multiple className="hidden" onChange={handlePhoto} />
        </div>
        <div className="h-4" />
      </form>
    </div>
  );
}

// ─── カレンダー画面 ───────────────────────────────────
function CalendarScreen({ items, onEditItem }) {
  const today = new Date();
  const [year, setYear]   = useState(today.getFullYear());
  const [month, setMonth] = useState(today.getMonth());
  const [selected, setSelected] = useState(null);

  const prevMonth = () => { if (month===0){setYear(y=>y-1);setMonth(11);}else setMonth(m=>m-1); setSelected(null); };
  const nextMonth = () => { if (month===11){setYear(y=>y+1);setMonth(0);}else setMonth(m=>m+1); setSelected(null); };

  const dayMap = {};
  items.forEach(item => {
    const d = new Date(item.expiryDate);
    if (d.getFullYear()===year && d.getMonth()===month) {
      const day = d.getDate();
      if (!dayMap[day]) dayMap[day] = [];
      dayMap[day].push(item);
    }
  });

  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const cells = [];
  for (let i=0;i<firstDay;i++) cells.push(null);
  for (let d=1;d<=daysInMonth;d++) cells.push(d);

  const isToday = d => d===today.getDate() && month===today.getMonth() && year===today.getFullYear();

  return (
    <div className="flex flex-col h-full">
      <div className="px-4 pt-5 pb-3 bg-cream-50">
        <h2 className="text-2xl font-bold text-gray-800 mb-4">カレンダー</h2>
        <div className="flex items-center justify-between bg-white rounded-2xl px-4 py-3 card-shadow">
          <button onClick={prevMonth} className="p-1 rounded-lg hover:bg-cream-100 transition-colors"><Icons.ChevronLeft /></button>
          <span className="font-semibold text-gray-800">{year}年{month+1}月</span>
          <button onClick={nextMonth} className="p-1 rounded-lg hover:bg-cream-100 transition-colors"><Icons.ChevronRight /></button>
        </div>
        <div className="grid grid-cols-7 mt-3 text-center">
          {['日','月','火','水','木','金','土'].map((w,i) => (
            <div key={w} className={`text-xs font-medium py-1 ${i===0?'text-red-400':i===6?'text-blue-400':'text-gray-400'}`}>{w}</div>
          ))}
        </div>
      </div>
      <div className="px-4 overflow-y-auto flex-1">
        <div className="grid grid-cols-7 gap-1">
          {cells.map((d, i) => {
            if (!d) return <div key={`e${i}`}/>;
            const here = dayMap[d] || [];
            const maxDays = here.length>0 ? Math.min(...here.map(x=>daysUntil(x.expiryDate))) : null;
            const dotColor = maxDays===null?'':maxDays<0?'bg-gray-300':maxDays<=7?'bg-red-400':maxDays<=30?'bg-yellow-400':'bg-blue-400';
            const isSel = selected===d;
            return (
              <button key={d} onClick={() => setSelected(isSel?null:d)}
                className={`relative flex flex-col items-center py-1.5 rounded-xl transition-colors min-h-[52px] ${isSel?'bg-amber-500 text-white':isToday(d)?'bg-amber-100 text-amber-700':'hover:bg-cream-100 text-gray-700'}`}>
                <span className={`text-sm font-medium ${i%7===0?'text-red-400':i%7===6?'text-blue-400':''} ${isSel?'text-white':''}`}>{d}</span>
                {here.length>0 && (
                  <div className="flex gap-0.5 mt-1 flex-wrap justify-center px-1">
                    {here.slice(0,3).map((_,j) => <div key={j} className={`w-1.5 h-1.5 rounded-full ${isSel?'bg-white':dotColor}`}/>)}
                    {here.length>3 && <div className={`text-[8px] ${isSel?'text-white':'text-gray-400'}`}>+</div>}
                  </div>
                )}
              </button>
            );
          })}
        </div>
        {selected && (
          <div className="mt-4 mb-4">
            <h3 className="text-sm font-semibold text-gray-600 mb-2">{month+1}月{selected}日</h3>
            {(dayMap[selected]||[]).length===0
              ? <p className="text-sm text-gray-300 text-center py-4">この日に期限のものはありません</p>
              : (dayMap[selected]||[]).map(item => {
                  const days = daysUntil(item.expiryDate);
                  const color = urgencyColor(days);
                  return (
                    <div key={item.id} onClick={() => onEditItem(item)}
                      className={`flex items-center gap-3 rounded-xl p-3 border ${color.bg} ${color.border} cursor-pointer mb-2`}>
                      <div className={`w-2 h-2 rounded-full flex-shrink-0 ${color.dot}`}/>
                      <div className="flex-1 min-w-0">
                        <p className="text-sm font-medium text-gray-800 truncate">{item.name}</p>
                        <p className="text-xs text-gray-400">{item.category}{item.location?`・${item.location}`:''}</p>
                      </div>
                      <span className={`text-xs px-2 py-0.5 rounded-full ${color.badge}`}>{days<0?'期限切れ':`残${days}日`}</span>
                    </div>
                  );
                })
            }
          </div>
        )}
        <div className="flex gap-4 justify-center py-4 text-xs text-gray-400">
          <span className="flex items-center gap-1"><span className="w-2 h-2 rounded-full bg-red-400 inline-block"/>1週間以内</span>
          <span className="flex items-center gap-1"><span className="w-2 h-2 rounded-full bg-yellow-400 inline-block"/>1ヶ月以内</span>
          <span className="flex items-center gap-1"><span className="w-2 h-2 rounded-full bg-blue-400 inline-block"/>余裕あり</span>
        </div>
      </div>
    </div>
  );
}

// ─── カテゴリ管理画面 ─────────────────────────────────
function CategoryScreen({ categories, onUpdate, onBack, saving }) {
  const [cats, setCats]     = useState(categories);
  const [newCat, setNewCat] = useState('');
  const [editIdx, setEditIdx] = useState(null);
  const [editVal, setEditVal] = useState('');

  const add = () => { const v=newCat.trim(); if(v&&!cats.includes(v)){setCats([...cats,v]);setNewCat('');} };
  const remove = idx => { if(DEFAULT_CATEGORIES.includes(cats[idx]))return; setCats(cats.filter((_,i)=>i!==idx)); };
  const saveEdit = idx => { const v=editVal.trim(); if(v&&!cats.includes(v)){const n=[...cats];n[idx]=v;setCats(n);} setEditIdx(null); };

  return (
    <div className="flex flex-col h-full">
      <div className="flex items-center justify-between px-4 py-4 border-b border-cream-200">
        <button onClick={onBack} className="p-2 rounded-xl hover:bg-cream-100 transition-colors"><Icons.X /></button>
        <h2 className="font-semibold text-gray-800 text-lg">カテゴリ管理</h2>
        <button onClick={() => { onUpdate(cats); onBack(); }} disabled={saving}
          className="bg-amber-500 hover:bg-amber-600 disabled:opacity-50 text-white px-4 py-1.5 rounded-xl text-sm font-medium transition-colors flex items-center gap-1">
          <Icons.Check /> 完了
        </button>
      </div>
      <div className="flex-1 overflow-y-auto px-4 py-5 space-y-3">
        {cats.map((cat, idx) => (
          <div key={idx} className="bg-white rounded-xl border border-cream-200 px-4 py-3 flex items-center gap-3 card-shadow">
            {editIdx===idx ? (
              <>
                <input autoFocus value={editVal} onChange={e=>setEditVal(e.target.value)} onKeyDown={e=>e.key==='Enter'&&saveEdit(idx)}
                  className="flex-1 bg-cream-50 border border-cream-200 rounded-lg px-3 py-1 text-sm focus:outline-none focus:ring-2 focus:ring-amber-300"/>
                <button onClick={()=>saveEdit(idx)} className="text-amber-500 text-sm font-medium">保存</button>
                <button onClick={()=>setEditIdx(null)} className="text-gray-400 text-sm">取消</button>
              </>
            ) : (
              <>
                <span className="flex-1 text-gray-700">{cat}</span>
                {DEFAULT_CATEGORIES.includes(cat)
                  ? <span className="text-xs text-gray-300">デフォルト</span>
                  : <>
                      <button onClick={()=>{setEditIdx(idx);setEditVal(cat);}} className="text-gray-400 hover:text-amber-500 transition-colors"><Icons.Edit /></button>
                      <button onClick={()=>remove(idx)} className="text-gray-400 hover:text-red-400 transition-colors"><Icons.Trash /></button>
                    </>
                }
              </>
            )}
          </div>
        ))}
        <div className="bg-white rounded-xl border border-dashed border-amber-200 px-4 py-3 flex items-center gap-2">
          <input type="text" value={newCat} onChange={e=>setNewCat(e.target.value)} onKeyDown={e=>e.key==='Enter'&&add()}
            placeholder="新しいカテゴリを追加"
            className="flex-1 bg-transparent text-sm text-gray-700 placeholder-gray-300 focus:outline-none"/>
          <button onClick={add} className="bg-amber-500 hover:bg-amber-600 text-white rounded-lg px-3 py-1.5 text-sm font-medium transition-colors">追加</button>
        </div>
      </div>
    </div>
  );
}

// ─── ホーム画面 ───────────────────────────────────────
function HomeScreen({ items, categories, onEdit, onDelete, user, onSignOut }) {
  const [filterCat, setFilterCat]     = useState('すべて');
  const [deleteConfirm, setDeleteConfirm] = useState(null);
  const [expiredOpen, setExpiredOpen] = useState(false);

  const allSorted = [...items].sort((a,b) => daysUntil(a.expiryDate) - daysUntil(b.expiryDate));
  const expired = allSorted.filter(i => daysUntil(i.expiryDate) < 0);
  const active  = allSorted.filter(i => daysUntil(i.expiryDate) >= 0);
  const filteredActive  = filterCat==='すべて' ? active  : active.filter(i=>i.category===filterCat);
  const filteredExpired = filterCat==='すべて' ? expired : expired.filter(i=>i.category===filterCat);
  const red    = active.filter(i=>daysUntil(i.expiryDate)<=7).length;
  const yellow = active.filter(i=>{const d=daysUntil(i.expiryDate);return d>7&&d<=30;}).length;

  return (
    <div className="flex flex-col h-full">
      <div className="sticky top-0 z-10 bg-cream-50/95 backdrop-blur-sm px-4 pt-5 pb-3">
        <div className="flex items-center justify-between mb-3">
          <div>
            <h1 className="text-2xl font-bold text-gray-800">期限管理</h1>
            <p className="text-sm text-gray-400">{items.length}件登録中</p>
          </div>
          {/* アバター＋ログアウト */}
          <button onClick={onSignOut}
            className="flex items-center gap-2 bg-white border border-cream-200 rounded-xl px-3 py-2 card-shadow hover:bg-cream-50 transition-colors">
            {user.photoURL
              ? <img src={user.photoURL} alt="" className="w-6 h-6 rounded-full"/>
              : <div className="w-6 h-6 rounded-full bg-amber-200 flex items-center justify-center text-xs font-bold text-amber-700">{user.displayName?.[0]}</div>
            }
            <Icons.LogOut />
          </button>
        </div>
        {active.length>0 && (red>0||yellow>0) && (
          <div className="flex gap-2 mb-3 flex-wrap">
            {red>0    && <span className="bg-red-100 text-red-600 text-xs px-3 py-1 rounded-full font-medium">🔴 期限間近 {red}件</span>}
            {yellow>0 && <span className="bg-yellow-100 text-yellow-600 text-xs px-3 py-1 rounded-full font-medium">🟡 もうすぐ {yellow}件</span>}
          </div>
        )}
        <div className="flex gap-2 overflow-x-auto pb-1">
          {['すべて', ...categories].map(cat => (
            <button key={cat} onClick={() => setFilterCat(cat)}
              className={`flex-shrink-0 px-3 py-1.5 rounded-full text-sm font-medium transition-colors ${filterCat===cat?'bg-amber-500 text-white':'bg-white border border-cream-200 text-gray-600 hover:bg-cream-100'}`}>
              {cat}
            </button>
          ))}
        </div>
      </div>

      <div className="px-4 py-3 space-y-3 overflow-y-auto flex-1">
        {filteredExpired.length>0 && (
          <div className="rounded-2xl border border-gray-300 overflow-hidden">
            <button onClick={() => setExpiredOpen(o=>!o)}
              className="w-full flex items-center justify-between px-4 py-3 bg-gray-100 hover:bg-gray-150 transition-colors">
              <div className="flex items-center gap-2">
                <span className="w-2 h-2 rounded-full bg-gray-600 flex-shrink-0"/>
                <span className="text-sm font-semibold text-gray-700">期限切れ {filteredExpired.length}件</span>
              </div>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"
                className={`w-4 h-4 text-gray-500 transition-transform duration-200 ${expiredOpen?'rotate-180':''}`}>
                <path strokeLinecap="round" strokeLinejoin="round" d="M19 9l-7 7-7-7"/>
              </svg>
            </button>
            {expiredOpen && (
              <div className="divide-y divide-gray-100">
                {filteredExpired.map(item => (
                  <div key={item.id} className="bg-gray-50 px-4 py-3 flex items-center gap-3">
                    {item.photos?.[0]
                      ? <img src={item.photos[0]} alt="" className="w-10 h-10 rounded-lg object-cover flex-shrink-0 opacity-60"/>
                      : <div className="w-10 h-10 rounded-lg bg-white flex items-center justify-center flex-shrink-0 text-lg opacity-60">
                          {item.category==='食品'?'🍱':item.category==='化粧品'?'💄':item.category==='薬'?'💊':'📦'}
                        </div>
                    }
                    <div className="flex-1 min-w-0">
                      <p className="text-sm font-medium text-gray-600 truncate">{item.name}</p>
                      <p className="text-xs text-gray-400">{formatDate(item.expiryDate)}（{Math.abs(daysUntil(item.expiryDate))}日超過）</p>
                    </div>
                    <div className="flex gap-1 flex-shrink-0">
                      <button onClick={() => onEdit(item)} className="p-1.5 rounded-lg hover:bg-white text-gray-400 transition-colors">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="w-4 h-4"><path strokeLinecap="round" strokeLinejoin="round" d="M15.232 5.232l3.536 3.536M9 13l6.293-6.293a1 1 0 011.414 0l1.586 1.586a1 1 0 010 1.414L12 16H9v-3z"/></svg>
                      </button>
                      <button onClick={() => setDeleteConfirm(item.id)} className="p-1.5 rounded-lg hover:bg-white text-red-300 transition-colors">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="w-4 h-4"><path strokeLinecap="round" strokeLinejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                      </button>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
        )}

        {filteredActive.length===0 && filteredExpired.length===0 ? (
          <div className="flex flex-col items-center justify-center py-20 text-gray-300">
            <div className="text-6xl mb-4">📦</div>
            <p className="text-lg font-medium text-gray-400">まだ登録がありません</p>
            <p className="text-sm text-gray-300 mt-1">＋ボタンから追加しましょう</p>
          </div>
        ) : (
          filteredActive.map(item => (
            <ItemCard key={item.id} item={item} onEdit={onEdit} onDelete={id => setDeleteConfirm(id)} />
          ))
        )}
        <div className="h-4"/>
      </div>

      {deleteConfirm && (
        <div className="fixed inset-0 bg-black/40 backdrop-blur-sm flex items-end justify-center z-30 px-4 pb-8">
          <div className="bg-white rounded-2xl p-6 w-full max-w-sm card-shadow">
            <h3 className="font-semibold text-gray-800 text-lg mb-2 text-center">削除しますか？</h3>
            <p className="text-gray-400 text-sm text-center mb-5">この操作は取り消せません</p>
            <div className="flex gap-3">
              <button onClick={() => setDeleteConfirm(null)}
                className="flex-1 py-3 rounded-xl border border-cream-200 text-gray-600 font-medium hover:bg-cream-50 transition-colors">キャンセル</button>
              <button onClick={() => { onDelete(deleteConfirm); setDeleteConfirm(null); }}
                className="flex-1 py-3 rounded-xl bg-red-400 hover:bg-red-500 text-white font-medium transition-colors">削除する</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── メインアプリ ─────────────────────────────────────
function App() {
  const [user, setUser]         = useState(undefined); // undefined=確認中
  const [loginLoading, setLoginLoading] = useState(false);
  const [items, setItems]       = useState([]);
  const [categories, setCategories] = useState(DEFAULT_CATEGORIES);
  const [tab, setTab]           = useState('home');
  const [formOpen, setFormOpen] = useState(false);
  const [editItem, setEditItem] = useState(null);
  const [saving, setSaving]     = useState(false);

  // 認証状態の監視
  useEffect(() => {
    const unsub = auth.onAuthStateChanged(u => setUser(u ?? null));
    return unsub;
  }, []);

  // Firestoreリアルタイム同期
  useEffect(() => {
    if (!user) return;
    const unsubItems = db.collection(`users/${user.uid}/items`)
      .onSnapshot(snap => {
        setItems(snap.docs.map(d => ({ id: d.id, ...d.data() })));
      });
    const unsubCats = db.doc(`users/${user.uid}/settings/categories`)
      .onSnapshot(snap => {
        if (snap.exists) setCategories(snap.data().list);
        else setCategories(DEFAULT_CATEGORIES);
      });
    return () => { unsubItems(); unsubCats(); };
  }, [user]);

  const handleSignIn = async () => {
    setLoginLoading(true);
    try {
      const provider = new firebase.auth.GoogleAuthProvider();
      await auth.signInWithPopup(provider);
    } catch (e) { console.error(e); }
    setLoginLoading(false);
  };

  const handleSignOut = async () => {
    await auth.signOut();
    setItems([]); setCategories(DEFAULT_CATEGORIES);
  };

  const handleSave = async (item) => {
    setSaving(true);
    try {
      const { id, ...data } = item;
      await db.collection(`users/${user.uid}/items`).doc(id).set(data);
      setFormOpen(false); setEditItem(null);
    } catch(e) { console.error(e); alert('保存に失敗しました。'); }
    setSaving(false);
  };

  const handleDelete = async (id) => {
    try { await db.collection(`users/${user.uid}/items`).doc(id).delete(); }
    catch(e) { console.error(e); alert('削除に失敗しました。'); }
  };

  const handleUpdateCategories = async (cats) => {
    setSaving(true);
    try { await db.doc(`users/${user.uid}/settings/categories`).set({ list: cats }); }
    catch(e) { console.error(e); }
    setSaving(false);
  };

  const openEdit = (item) => { setEditItem(item); setFormOpen(true); };
  const openNew  = ()     => { setEditItem(null); setFormOpen(true); };

  // ─ 画面分岐 ─
  if (user === undefined) return <LoadingScreen />;
  if (!user) return <LoginScreen onSignIn={handleSignIn} loading={loginLoading} />;

  if (formOpen) return (
    <div className="min-h-screen bg-cream-50 flex flex-col max-w-md mx-auto">
      <FormScreen item={editItem} categories={categories} saving={saving}
        onSave={handleSave} onCancel={() => { setFormOpen(false); setEditItem(null); }} />
    </div>
  );

  if (tab === 'categories') return (
    <div className="min-h-screen bg-cream-50 flex flex-col max-w-md mx-auto">
      <CategoryScreen categories={categories} saving={saving}
        onUpdate={handleUpdateCategories} onBack={() => setTab('home')} />
    </div>
  );

  return (
    <div className="min-h-screen bg-cream-50 flex flex-col max-w-md mx-auto">
      <div className="flex-1 overflow-hidden flex flex-col pb-24">
        {tab==='home' && (
          <HomeScreen items={items} categories={categories}
            onEdit={openEdit} onDelete={handleDelete} user={user} onSignOut={handleSignOut} />
        )}
        {tab==='calendar' && <CalendarScreen items={items} onEditItem={openEdit} />}
      </div>

      {/* ボトムナビ */}
      <div className="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-md bg-white nav-shadow z-20">
        <div className="flex items-end justify-around px-4 pt-2 pb-safe">
          <button onClick={() => setTab('home')}
            className={`flex flex-col items-center gap-1 py-2 px-5 transition-colors ${tab==='home'?'text-amber-500':'text-gray-400'}`}>
            <Icons.Home /><span className="text-xs font-medium">ホーム</span>
          </button>
          <div className="relative flex flex-col items-center -mt-6">
            <button onClick={openNew}
              className="w-16 h-16 bg-amber-500 hover:bg-amber-600 active:bg-amber-700 text-white rounded-full shadow-lg flex items-center justify-center transition-all active:scale-95"
              style={{ boxShadow:'0 4px 20px rgba(245,158,11,0.45)' }}>
              <Icons.Plus />
            </button>
            <span className="text-xs font-medium text-gray-400 mt-1">追加</span>
          </div>
          <button onClick={() => setTab('calendar')}
            className={`flex flex-col items-center gap-1 py-2 px-5 transition-colors ${tab==='calendar'?'text-amber-500':'text-gray-400'}`}>
            <Icons.Calendar /><span className="text-xs font-medium">カレンダー</span>
          </button>
        </div>
      </div>

      {tab==='home' && (
        <button onClick={() => setTab('categories')}
          className="fixed top-5 right-4 z-10 p-2.5 rounded-xl bg-white border border-cream-200 text-gray-500 hover:bg-cream-100 card-shadow transition-colors"
          style={{ right:'max(1rem, calc(50vw - 208px + 1rem))' }}>
          <Icons.Tag />
        </button>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
